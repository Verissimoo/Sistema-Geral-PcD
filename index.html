<!doctype html>
<html lang="pt-BR" class="theme-dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/brand/logomini.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    // Aplica o tema salvo antes do paint para evitar flash (padrão: dark)
    (function () {
      try {
        var t = localStorage.getItem('pcd_theme') || 'dark';
        var root = document.documentElement;
        root.classList.remove('theme-dark', 'theme-light');
        root.classList.add('theme-' + t);
      } catch (e) {
        document.documentElement.classList.add('theme-dark');
      }
    })();
  </script>
  <title>PassagensComDesconto(Interno)</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
